<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />

<!-- iPhone responsive + safe area support -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>

<!-- iOS "app mode" -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Home screen icon -->
<link rel="apple-touch-icon" href="icon.png">

<title>EMSC 30Y Steel Pin Shoot</title>

<style>

/* ✅ FULL SCREEN BACKGROUND (your image) */
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #111 url("background3.png") center bottom / cover no-repeat;
}

/* ✅ BODY LAYOUT */
body {
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding-top: env(safe-area-inset-top, 20px);
}

/* ✅ APP CONTAINER (glass overlay) */
.app {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    min-height: 100vh;
    margin: 0 auto;

background: rgba(0, 0, 0, 0.30);
backdrop-filter: blur(1px);
}

.title {
    text-align: center;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 15px;
    text-transform: uppercase;
}

.title .main {
    font-size: 52px;
    color: white;
    -webkit-text-stroke: 1px black;
}

.title .sub {
    font-size: 42px;
    color: white;
    -webkit-text-stroke: 1px black;
}

.title .bottom {
    font-size: 28px;
    color: white;
    -webkit-text-stroke: 1px black;
    margin-top: 5px;
}

.grid {
    margin-top: 15px;
}

.row {
    display: grid;
    grid-template-columns: 70px repeat(5, 1fr) 60px;
    gap: 6px;
    align-items: center;
    margin-bottom: 10px;
}

.label {
    text-align: center;
    font-weight: bold;
    background: #222;
    padding: 10px 0;
    border-radius: 6px;
}

.shot {
    background: #eee;
    height: 45px;
    border-radius: 6px;
    cursor: pointer;
    border: 2px solid #444;
}

.shot.hit {
    background: limegreen;
}

.score {
    text-align: center;
    background: #000;
    border: 2px solid red;
    border-radius: 6px;
    padding: 10px 0;
    font-size: 20px;
}

.total {
    margin-top: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #000;
    padding: 15px;
    border-radius: 8px;
    border: 2px solid #333;
}

.buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 15px;
}

button {
    flex: 1;
    margin: 5px;
    padding: 12px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    color: white;
}

.reset-all { background: #1e5eff; }
.stats { background: #444; }
.reset-round { background: #d32f2f; }

</style>
</head>

<body>
<div class="app">

    <div class="title">
        <div class="main">EMSC</div>
        <div class="sub">30Y</div>
        <div class="bottom">PISTOL SHOOT</div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="total">
        <div><b>TOTAL HITS</b></div>
        <div id="totalHits" style="font-size:28px;color:red;">0</div>
    </div>

    <div class="buttons">
        <button class="reset-all" onclick="resetAll()">RESET ALL</button>
        <button class="stats" onclick="showStats()">STATS</button>
        <button class="reset-round" onclick="resetRound()">RESET ROUND</button>
    </div>

</div>

<script>
const rounds = 5;
const shotsPerRound = 5;

const grid = document.getElementById("grid");

let data = Array.from({length: rounds}, () =>
    Array(shotsPerRound).fill(false)
);

function render() {
    grid.innerHTML = "";

    let total = 0;

    data.forEach((round, r) => {
        const row = document.createElement("div");
        row.className = "row";

        const label = document.createElement("div");
        label.className = "label";
        label.textContent = "ROUND " + (r + 1);

        row.appendChild(label);

        round.forEach((hit, s) => {
            const box = document.createElement("div");
            box.className = "shot" + (hit ? " hit" : "");
            box.onclick = () => {
                data[r][s] = !data[r][s];
                render();
            };
            row.appendChild(box);

            if (hit) total++;
        });

        const score = document.createElement("div");
        score.className = "score";
        score.textContent = round.filter(Boolean).length;

        row.appendChild(score);

        grid.appendChild(row);
    });

    document.getElementById("totalHits").textContent = total;
}

function resetAll() {
    data = data.map(r => r.map(() => false));
    render();
}

function resetRound() {
    const r = prompt("Reset which round? (1-5)");
    const idx = parseInt(r) - 1;
    if (idx >= 0 && idx < rounds) {
        data[idx] = data[idx].map(() => false);
        render();
    }
}

function showStats() {
    let msg = data.map((r, i) =>
        `Round ${i+1}: ${r.filter(Boolean).length} hits`
    ).join("\n");

    alert(msg);
}

render();
</script>

</body>
</html>
